services:
  mongodb:
    image: mongo:6
    container_name: deploy_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - deploy_net

  backend:
    build: ./backend
    container_name: deploy_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/deploydb
      - JWT_SECRET=mysecretkey123
      - NODE_ENV=production
      - RENDER_API_KEY=rnd_jf7dQBsbYzQnFRcyktsEH1ZPC8tI

    depends_on:
      - mongodb
    networks:
      - deploy_net

  frontend:
    build: ./frontend
    container_name: deploy_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - deploy_net

volumes:
  mongo_data:


networks:
  deploy_net:
    driver: bridge
